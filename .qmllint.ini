; qmllint configuration for the game-shell QML shell.
;
; WHY THIS EXISTS: qmlformat (lint.yml) only proves a file *parses*; it never
; catches QML that parses but fails to LOAD (a duplicate signal/property, a bad
; signal-handler name, an alias/inheritance cycle). This config makes qmllint the
; gate for that class — see .github/workflows/lint.yml.
;
; SEVERITY MODEL (Qt 6.8-compatible — IMPORTANT): qmllint on Qt 6.8 has only three
; levels — disable / info / warning. The `error` level is newer (Qt 6.9+); using
; it makes 6.8 reject the whole config and exit with usage text. CI's authoritative
; Qt is 6.8, so this file uses ONLY disable/info/warning. The gate is instead
; driven by MaxWarnings=0 (below):
;   - warning  → GATED. A hit exits non-zero and fails CI. (All clean on the tree.)
;   - info     → visible in logs but NEVER affects the exit code.
;   - disable  → silent.
; A hard parse error is always fatal regardless of this config.
;
; THE CONSTRAINT: stock qmllint cannot resolve the Quickshell modules
; (Quickshell, Quickshell.Io, Quickshell.Wayland, Quickshell.Services.Mpris) or
; the shell's heavy duck-typing (Loader.item / `var` items queried for a
; contract). So every *resolution-dependent* category (unresolved-type,
; missing-property, unqualified access, import failure, incompatible-type, …)
; fires in the hundreds on a perfectly good tree — pure noise, demoted to
; info/disable here. What we GATE on is the *resolution-INDEPENDENT* set:
; structural defects qmllint flags from the AST alone (duplicate names, bad
; signal-handler params, cycles, assignment-in-condition, …) — all clean on the
; current tree, all version-stable, and exactly the "parses but won't load / is a
; latent bug" class.
;
; INVARIANT: because MaxWarnings=0 fails on ANY warning-level hit, EVERY category
; that fires on this tree MUST be info/disable below — including several that
; qmllint defaults to `warning`. If you add code that trips a new resolution
; category, demote it here rather than "fixing" a non-bug.
;
; To tighten later: once components are decoupled from Quickshell (or stub
; Quickshell type info is fed via -I), promote unresolved-type / missing-property
; from info → warning.

[General]
DisableDefaultImports=false
; THE GATE: fail the run if ANY warning-level category fires (info does not count,
; disable is silent). Everything that fires on a clean tree is demoted below.
MaxWarnings=0

[Warnings]
; === GATE (warning): resolution-independent structural defects, all 0 on tree ===
; Duplicate declarations — the "duplicate signal/property" load-failure class.
DuplicatedName=warning
DuplicateEnumEntries=warning
DuplicateInlineComponent=warning
DuplicateImport=warning
; Bad signal-handler names/params — the "on<Foo> handler that silently no-ops".
BadSignalHandlerParameters=warning
; Cycles that make a component fail to construct.
AliasCycle=warning
InheritanceCycle=warning
UnresolvedAlias=warning
; Enum defects.
EnumEntryMatchesEnum=warning
MissingEnumEntry=warning
NonRootEnum=warning
; Structural / control-flow defects.
AssignmentInCondition=warning
Comma=warning
WithStatement=warning
Eval=warning
UnterminatedCase=warning
UnreachableCode=warning
TopLevelComponent=warning
NonListProperty=warning
; A stale/typo'd `// qmllint disable ...` directive must not silently rot.
InvalidLintDirective=warning

; === INFO: fires on the tree but must NOT gate (resolution noise / intentional) ==
; The 4 unresolvable Quickshell modules' types (PanelWindow `anchors`,
; WlrLayershell, Socket/Mpris members) + intentional patterns (ServiceMonitor's
; `data` default-property rebind, MprisPlayerBase's canFocus override, one ==).
UnresolvedType=info
MissingType=info
DuplicatePropertyBinding=info
PropertyOverride=info
IncompatibleType=info
EqualityTypeCoercion=info
UncreatableType=info
Deprecated=info
StalePropertyRead=info
ReadOnlyProperty=info
Quick.LayoutsPositioning=info
Quick.PropertyChangesParsed=info
Quick.AttachedPropertyType=info
MultilineStrings=info

; === DISABLE: pure resolution noise on this tree (hundreds of hits) ===
UnqualifiedAccess=disable
AccessSingletonViaObject=disable
ImportFailure=disable
UnusedImports=disable
MissingProperty=disable
RequiredProperty=disable
PrefixedImportType=disable
ContextProperties=disable

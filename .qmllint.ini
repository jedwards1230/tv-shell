; qmllint configuration for the game-shell QML shell.
;
; WHY THIS EXISTS: qmlformat (lint.yml) only proves a file *parses*; it never
; catches QML that parses but fails to LOAD (a duplicate signal/property, a bad
; signal-handler name, an alias/inheritance cycle). This config makes qmllint the
; gate for that class — see .github/workflows/lint.yml.
;
; THE CONSTRAINT: stock qmllint cannot resolve the Quickshell modules
; (Quickshell, Quickshell.Io, Quickshell.Wayland, Quickshell.Services.Mpris) or
; the shell's heavy duck-typing (Loader.item / `var` items queried for a
; contract). So every *resolution-dependent* category (unresolved-type,
; missing-property, unqualified access, import failure, incompatible-type, …)
; fires in the hundreds on a perfectly good tree — pure noise, not bugs. Those
; are demoted to info/disable here.
;
; What stays an ERROR is the *resolution-INDEPENDENT* set: structural defects
; qmllint flags from the AST alone, which are all clean on the current tree and
; are exactly the "parses but won't load / is a latent bug" class. A parse error
; (unbalanced braces, invalid QML) is always fatal regardless of this config.
;
; To tighten this gate: once a batch of components is decoupled from Quickshell
; (or stub Quickshell type info is fed via -I), promote unresolved-type /
; missing-property from warning → error.

[General]
DisableDefaultImports=false
; Warnings never fail the run; only `error`-level categories (and parse errors)
; do. Keep this unlimited so demoted-to-warning categories stay visible in logs
; without wedging the gate.
MaxWarnings=-1

[Warnings]
; === ERROR: resolution-independent structural defects (all 0 on current tree) ===
; Duplicate declarations — the "duplicate signal/property" load-failure class.
DuplicatedName=error
DuplicateEnumEntries=error
DuplicateInlineComponent=error
DuplicateImport=error
; Bad signal-handler names/params — the "on<Foo> handler that silently no-ops".
BadSignalHandlerParameters=error
; Cycles that make a component fail to construct.
AliasCycle=error
InheritanceCycle=error
UnresolvedAlias=error
; Enum defects.
EnumEntryMatchesEnum=error
MissingEnumEntry=error
NonRootEnum=error
; Structural / control-flow defects.
AssignmentInCondition=error
Comma=error
WithStatement=error
Eval=error
UnterminatedCase=error
UnreachableCode=error
TopLevelComponent=error
NonListProperty=error
; A stale/typo'd `// qmllint disable ...` directive must not silently rot.
InvalidLintDirective=error

; === WARNING: visible but non-fatal (resolution-dependent; noisy but useful) ===
; Mostly the 4 Quickshell modules' types (e.g. PanelWindow `anchors`,
; WlrLayershell) plus a handful of real signals worth eyeballing.
UnresolvedType=warning
DuplicatePropertyBinding=warning
EqualityTypeCoercion=warning

; === INFO/DISABLE: pure resolution noise on this tree (hundreds of hits) ===
UnqualifiedAccess=disable
ImportFailure=disable
MissingProperty=disable
IncompatibleType=disable
RequiredProperty=disable
PropertyOverride=disable
UnusedImports=info
MultilineStrings=info
Quick.LayoutsPositioning=info
Quick.PropertyChangesParsed=info

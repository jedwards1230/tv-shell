# Generic default: let Hyprland pick the preferred mode/scale on any display, so
# a fresh clone boots cleanly on arbitrary hardware. Machine-specific tuning
# (resolution/refresh/HDR/VRR/SDR-compensation) lives in a per-user override —
# see config/hyprland.conf.example and copy it to the source line below.
monitor=,preferred,auto,auto

# Per-machine display override hook. Hyprland silently ignores a missing source
# target, so this is a no-op until the user drops their own file there. Put your
# specific monitor= line (and any quirks/render HDR knobs) in this file — the LG
# C2 / Denon 4K@120 10-bit HDR setup ships in config/hyprland.conf.example.
source = ~/.config/game-shell/hyprland-local.conf

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
    force_default_wallpaper = 0
    vrr = 1
    # Kiosk: a newly-launched app takes over fullscreen instead of un-fullscreening
    # the workspace (0.55 default `2` tiles them; `1` = new window takes over).
    # Restores the old "every app fills the screen" behavior. Hyprland allows only
    # one fullscreen window per workspace, so this is the right knob, not the rule.
    on_focus_under_fullscreen = 1
}

general {
    border_size = 0
    gaps_in = 0
    gaps_out = 0
}

decoration {
    rounding = 0
    shadow:enabled = false
    blur:enabled = false
}

animations {
    enabled = false
}

input {
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

cursor {
    hide_on_key_press = true
    # Hide the pointer after 2s of no mouse movement. `hide_on_key_press` only
    # covers the keyboard; gamepad input rides the daemon → virtual-gamepad path
    # (not a key press), so without this the compositor cursor stays parked —
    # most visibly as a large pointer dead-center over a fullscreen Moonlight
    # stream when you're driving with the pad. Reappears on the next mouse move.
    inactive_timeout = 2
}

xwayland {
    force_zero_scaling = true
}

# All app windows open fullscreen (Quickshell uses layer shell, unaffected).
# Hyprland 0.55 parses each comma-separated windowrule field as `<key> <value>`
# (space-separated); a `match:` prefix marks a matcher, no prefix marks an
# effect — order between fields doesn't change how either one parses (both
# orderings pass `hyprctl configerrors` clean). The deployed
# `match:class .+, fullscreen on` was still wrong: it's the matcher-first
# ordering that has since bitten other people too (see
# github.com/hyprwm/Hyprland#14604) — the wiki-documented, community-confirmed
# form is effect-first, `<effect> <value>, match:<prop> <value>`.
# `match:class .+` = any window with a class. This alone is a best-effort
# backstop, not the primary fix: the static effect only lands if the new
# window also wins initial keyboard focus on the same map (Hyprland gates it
# on `!m_noInitialFocus`). Quickshell's shell surface (shell.qml) holds
# `WlrKeyboardFocus.Exclusive` while it's mapped, so that focus was never
# actually up for grabs during a local-app launch — see the `state = "launching"`
# fix on `AppLifecycleManager.onLaunchStarted` in shell.qml, which unmaps the
# shell surface (and releases that exclusive grab) before the app process is
# even spawned. `force_fullscreen` in `daemon/src/hyprland.rs` is then a
# class-agnostic backstop on top of that: it re-asserts fullscreen
# imperatively on every `openwindow`, in case focus timing still slips.
windowrule = fullscreen on, match:class .+

# Emergency exit to TTY
bind = SUPER, Q, exit

# Keyboard control surface (the daemon no longer snoops the keyboard — these
# binds inject named intents into its control surface via super-intent.sh,
# which re-broadcasts `intent:*` to the QML shell):
#   bare Super        -> intent menu             (toggle the home nav drawer)
#   Super + Escape    -> intent home             (return-to-shell escape from an app)
#   Super + Backspace -> intent home-hold        (reset to home)
#   Super + Right     -> intent overlay:session  (open the right-edge Session QAM, #218)
#
# Claiming the bare Super_L press at the compositor also keeps focused apps
# (e.g. 1Password) from ever seeing a stray Super. Note a bare Super press
# fires on the way into any Super+<key> chord, so `menu` is a home-screen-only
# no-op over a running app (shell.qml) — the chord's intent does the real work.
# More-specific chords (`SUPER, Q` emergency exit above, Escape, Backspace)
# still resolve to their own binds.
#
# super-intent.sh is resolved via PATH (game-shell-session.sh prepends
# $GAME_SHELL_DIR/scripts), so these binds work regardless of install prefix.
bind = , Super_L, exec, super-intent.sh menu
bind = SUPER, Escape, exec, super-intent.sh home
bind = SUPER, Backspace, exec, super-intent.sh home-hold
bind = SUPER, Right, exec, super-intent.sh overlay:session

# Autostart Quickshell as a `systemd --user` unit (game-shell-quickshell.service).
# Running it under systemd — not as a bare exec-once child — is what enforces a
# SINGLE Quickshell instance and restart-on-crash, killing the "3-4 stacked
# instances" bug class (#254). The unit tees quickshell's output to BOTH the
# journal (tagged `game-shell-quickshell`) and /tmp/qs-log.txt, so
# `journalctl --user -t game-shell-quickshell -f` and the daemon's dev bridge
# (/dev/logs, /dev/restart-shell) keep reading the same logs.
#
# First `import-environment` the live Wayland/Hyprland session vars into the user
# manager so the unit (which inherits none of Hyprland's per-client env) can reach
# the compositor. This MUST happen here, not in game-shell-session.sh: the session
# wrapper runs before `exec Hyprland`, when WAYLAND_DISPLAY / the instance
# signature don't exist yet — only an exec-once child, launched by the running
# compositor, sees them. (The input daemon self-discovers this env in Rust; the
# Quickshell process can't, hence the import.)
#
# Fallback: if `systemctl --user start` fails (no user manager/bus, or the unit
# isn't installed — a fresh/dev tree), spawn quickshell directly with the same
# dual-sink logging as before. `systemctl start` on a Type=simple unit returns
# once the process is forked, so `&& exit 0` lets the exec-once shell exit while
# quickshell keeps running under the unit. One line: `sh -c` so the pipe/fallback
# survives Hyprland's exec parsing.
exec-once = sh -c 'systemctl --user import-environment WAYLAND_DISPLAY HYPRLAND_INSTANCE_SIGNATURE XDG_RUNTIME_DIR 2>/dev/null; systemctl --user start game-shell-quickshell.service 2>/dev/null && exit 0; if command -v systemd-cat >/dev/null 2>&1; then quickshell -c game-shell 2>&1 | tee /tmp/qs-log.txt | systemd-cat -t game-shell-quickshell; else quickshell -c game-shell > /tmp/qs-log.txt 2>&1; fi'

# 4K@120Hz, 10-bit HDR, VRR on LG C2 via Denon AVR.
# sdrbrightness=1.2 boosts SDR content by 20% to compensate for the
# dimming SDR gets when the display is in HDR mode (PQ EOTF maps SDR
# white at ~80 nits by default). sdrsaturation=1.05 adds a small
# saturation bump to counter the wider gamut washing out sRGB primaries.
# Without these, SDR apps (1Password, browsers, Quickshell home) render
# dim and desaturated. Tune values to taste on the LG C2.
monitor=HDMI-A-1,3840x2160@120,0x0,2,vrr,1,bitdepth,10,cm,hdr,sdrbrightness,1.2,sdrsaturation,1.05

# Fallback for any other monitor
monitor=,preferred,auto,auto

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
    force_default_wallpaper = 0
    vrr = 1
}

general {
    border_size = 0
    gaps_in = 0
    gaps_out = 0
}

decoration {
    rounding = 0
    shadow:enabled = false
    blur:enabled = false
}

animations {
    enabled = false
}

input {
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

cursor {
    hide_on_key_press = true
}

xwayland {
    force_zero_scaling = true
}

# All app windows open fullscreen (Quickshell uses layer shell, unaffected).
# Hyprland 0.53+ replaced the `windowrule = ...` string form with Lua-table rules
# (hl.window_rule). match class ".+" = any window with a class.
hl.window_rule({ match = { class = ".+" }, fullscreen = true })

# Emergency exit to TTY
bind = SUPER, Q, exit

# Keyboard control surface (the daemon no longer snoops the keyboard — these
# binds inject named intents into its control surface via super-intent.sh,
# which re-broadcasts `intent:*` to the QML shell):
#   bare Super        -> intent menu       (toggle the home nav drawer)
#   Super + Escape    -> intent home       (return-to-shell escape from an app)
#   Super + Backspace -> intent home-hold  (reset to home)
#
# Claiming the bare Super_L press at the compositor also keeps focused apps
# (e.g. 1Password) from ever seeing a stray Super. Note a bare Super press
# fires on the way into any Super+<key> chord, so `menu` is a home-screen-only
# no-op over a running app (shell.qml) — the chord's intent does the real work.
# More-specific chords (`SUPER, Q` emergency exit above, Escape, Backspace)
# still resolve to their own binds.
bind = , Super_L, exec, /opt/game-shell/scripts/super-intent.sh menu
bind = SUPER, Escape, exec, /opt/game-shell/scripts/super-intent.sh home
bind = SUPER, Backspace, exec, /opt/game-shell/scripts/super-intent.sh home-hold

# Autostart Quickshell
exec-once = quickshell -c game-shell

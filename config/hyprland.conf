# 4K@120Hz, 10-bit HDR, VRR on LG C2 via Denon AVR.
# sdrbrightness=1.2 boosts SDR content by 20% to compensate for the
# dimming SDR gets when the display is in HDR mode (PQ EOTF maps SDR
# white at ~80 nits by default). sdrsaturation=1.05 adds a small
# saturation bump to counter the wider gamut washing out sRGB primaries.
# Without these, SDR apps (1Password, browsers, Quickshell home) render
# dim and desaturated. Tune values to taste on the LG C2.
monitor=HDMI-A-1,3840x2160@120,0x0,2,vrr,1,bitdepth,10,cm,hdr,sdrbrightness,1.2,sdrsaturation,1.05

# Fallback for any other monitor
monitor=,preferred,auto,auto

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
    force_default_wallpaper = 0
    vrr = 1
}

# Hyprland 0.51.x regression: the frog color management protocol path
# silently ignores sdrbrightness/sdrsaturation, leaving SDR content
# dim and washed out in HDR mode. Disabling the experimental v4
# protocol falls back to the tested path that honors SDR compensation.
# See https://github.com/hyprwm/Hyprland/discussions/11677
experimental {
    xx_color_management_v4 = false
}

general {
    border_size = 0
    gaps_in = 0
    gaps_out = 0
}

decoration {
    rounding = 0
    shadow:enabled = false
    blur:enabled = false
}

animations {
    enabled = false
}

input {
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

cursor {
    hide_on_key_press = true
}

xwayland {
    force_zero_scaling = true
}

# All app windows open fullscreen (Quickshell uses layer shell, unaffected)
windowrulev2 = fullscreen,class:(.+)

# Emergency exit to TTY
bind = SUPER, Q, exit

# Keyboard global-escape: claim the bare Super_L press at the compositor
# and inject `intent home` into the input daemon's control surface (which
# re-broadcasts `intent:home` -> the QML shell returns to home). This is
# PRESS-ONLY: the daemon no longer snoops the keyboard, so there is no
# tap-vs-hold timer here. A "reset" is the QML-side multi-stroke (three
# rapid Super presses within 1.5 s), counted off the same `intent:home`
# stream — so we deliberately do NOT add a Super-hold bind (Hyprland's
# `bindr` release leg is unreliable for bare modifiers anyway).
#
# Claiming the press at the compositor also keeps focused apps (e.g.
# 1Password) from ever seeing a bare Super. The more-specific `SUPER, Q`
# bind above still wins for Super+Q.
bind = , Super_L, exec, /opt/game-shell/scripts/super-intent.sh

# Autostart Quickshell
exec-once = quickshell -c game-shell

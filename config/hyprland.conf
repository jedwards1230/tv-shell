# 4K@120Hz, 10-bit color, HDR, VRR on LG C2 via Denon AVR
monitor=HDMI-A-1,3840x2160@120,0x0,1,vrr,1,bitdepth,10,cm,hdr

# Fallback for any other monitor
monitor=,preferred,auto,auto

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
    force_default_wallpaper = 0
    vrr = 1
}

general {
    border_size = 0
    gaps_in = 0
    gaps_out = 0
}

decoration {
    rounding = 0
    shadow:enabled = false
    blur:enabled = false
}

animations {
    enabled = false
}

input {
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

cursor {
    hide_on_key_press = true
}

xwayland {
    force_zero_scaling = true
}

# Scale desktop apps for couch viewing — Quickshell overrides to 1 below
env = QT_SCALE_FACTOR,1.75
env = GDK_SCALE,2

# All app windows open fullscreen (Quickshell uses layer shell, unaffected)
windowrulev2 = fullscreen,class:(.+)

# Emergency exit to TTY
bind = SUPER, Q, exit

# Autostart Quickshell (reset QT_SCALE_FACTOR so the shell renders at native 4K)
exec-once = env QT_SCALE_FACTOR=1 quickshell -c game-shell

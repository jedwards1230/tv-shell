# 4K@120Hz, 10-bit color, HDR, VRR on LG C2 via Denon AVR
monitor=HDMI-A-1,3840x2160@120,0x0,2,vrr,1,bitdepth,10,cm,hdr

# Fallback for any other monitor
monitor=,preferred,auto,auto

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
    force_default_wallpaper = 0
    vrr = 1
}

general {
    border_size = 0
    gaps_in = 0
    gaps_out = 0
}

decoration {
    rounding = 0
    shadow:enabled = false
    blur:enabled = false
}

animations {
    enabled = false
}

input {
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

cursor {
    hide_on_key_press = true
}

xwayland {
    force_zero_scaling = true
}

# All app windows open fullscreen (Quickshell uses layer shell, unaffected)
windowrulev2 = fullscreen,class:(.+)

# Emergency exit to TTY
bind = SUPER, Q, exit

# Route keyboard Meta/Super to the game-shell input daemon so it behaves
# like the controller Home button — tap toggles the drawer, hold returns
# to the shell — even when another app has keyboard focus. The daemon's
# `inject keydown:meta` / `inject keyup:meta` handler runs the 2 s
# tap-vs-hold timer (see docs/IPC_PROTOCOL.md), then broadcasts the
# existing `home-press` / `combo:home-hold` events. Hyprland's
# more-specific `SUPER, Q` bind above still wins for Super+Q.
$gs_inject_meta_down = python3 -c "import socket,os; s=socket.socket(socket.AF_UNIX,socket.SOCK_STREAM); s.connect(os.environ.get('GAME_SHELL_SOCK','/run/user/'+str(os.getuid())+'/game-shell-input.sock')); s.sendall(b'inject keydown:meta\n')"
$gs_inject_meta_up   = python3 -c "import socket,os; s=socket.socket(socket.AF_UNIX,socket.SOCK_STREAM); s.connect(os.environ.get('GAME_SHELL_SOCK','/run/user/'+str(os.getuid())+'/game-shell-input.sock')); s.sendall(b'inject keyup:meta\n')"
bind  = , Super_L, exec, $gs_inject_meta_down
bindr = , Super_L, exec, $gs_inject_meta_up

# Autostart Quickshell
exec-once = quickshell -c game-shell

# 4K@120Hz, 10-bit color, HDR, VRR on LG C2 via Denon AVR
monitor=HDMI-A-1,3840x2160@120,0x0,1,vrr,1,bitdepth,10,cm,hdr

# Fallback for any other monitor
monitor=,preferred,auto,auto

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
    force_default_wallpaper = 0
    vrr = 1
}

general {
    border_size = 0
    gaps_in = 0
    gaps_out = 0
}

decoration {
    rounding = 0
    shadow:enabled = false
    blur:enabled = false
}

animations {
    enabled = false
}

input {
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

# Emergency exit to TTY
bind = SUPER, Q, exit

# Autostart Quickshell
exec-once = quickshell -c game-shell

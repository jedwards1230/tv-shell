# 4K@120Hz, 10-bit HDR, VRR via HDMI-connected display and AV receiver.
#
# HDR-over-AVR on Hyprland 0.55 REQUIRES quirks:prefer_hdr=1 (below). The 0.51
# workaround (experimental:xx_color_management_v4=false, disc #11677) was removed
# when the new color-management pipeline became the mandatory default in 0.52-0.55
# — and with plain `cm,hdr` the monitor comes up in HDR but the AVR/C2 never locks
# the signal (black screen). quirks:prefer_hdr=1 makes Hyprland present HDR before
# clients start, which fixes the lock. render:cm_auto_hdr=0 drives cm,hdr
# explicitly instead of auto-switching (avoids whitescreen on activation).
# sdrbrightness=1.2/sdrsaturation=1.05 compensate SDR dimming/washout in HDR mode.
monitor=HDMI-A-1,3840x2160@120,0x0,2,vrr,1,bitdepth,10,cm,hdr,sdrbrightness,1.2,sdrsaturation,1.05

# Fallback for any other monitor
monitor=,preferred,auto,auto

# HDR-over-AVR fix for Hyprland 0.55 (see monitor comment above).
quirks {
    prefer_hdr = 1
}
render {
    cm_auto_hdr = 0
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
    force_default_wallpaper = 0
    vrr = 1
    # Kiosk: a newly-launched app takes over fullscreen instead of un-fullscreening
    # the workspace (0.55 default `2` tiles them; `1` = new window takes over).
    # Restores the old "every app fills the screen" behavior. Hyprland allows only
    # one fullscreen window per workspace, so this is the right knob, not the rule.
    on_focus_under_fullscreen = 1
}

general {
    border_size = 0
    gaps_in = 0
    gaps_out = 0
}

decoration {
    rounding = 0
    shadow:enabled = false
    blur:enabled = false
}

animations {
    enabled = false
}

input {
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

cursor {
    hide_on_key_press = true
}

xwayland {
    force_zero_scaling = true
}

# All app windows open fullscreen (Quickshell uses layer shell, unaffected).
# Hyprland 0.53+ replaced the `windowrule = ...` string form with Lua-table rules
# (hl.window_rule). match class ".+" = any window with a class.
hl.window_rule({ match = { class = ".+" }, fullscreen = true })

# Emergency exit to TTY
bind = SUPER, Q, exit

# Keyboard control surface (the daemon no longer snoops the keyboard — these
# binds inject named intents into its control surface via super-intent.sh,
# which re-broadcasts `intent:*` to the QML shell):
#   bare Super        -> intent menu       (toggle the home nav drawer)
#   Super + Escape    -> intent home       (return-to-shell escape from an app)
#   Super + Backspace -> intent home-hold  (reset to home)
#
# Claiming the bare Super_L press at the compositor also keeps focused apps
# (e.g. 1Password) from ever seeing a stray Super. Note a bare Super press
# fires on the way into any Super+<key> chord, so `menu` is a home-screen-only
# no-op over a running app (shell.qml) — the chord's intent does the real work.
# More-specific chords (`SUPER, Q` emergency exit above, Escape, Backspace)
# still resolve to their own binds.
bind = , Super_L, exec, /opt/game-shell/scripts/super-intent.sh menu
bind = SUPER, Escape, exec, /opt/game-shell/scripts/super-intent.sh home
bind = SUPER, Backspace, exec, /opt/game-shell/scripts/super-intent.sh home-hold

# Autostart Quickshell
exec-once = quickshell -c game-shell

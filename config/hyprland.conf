# 4K@120Hz, 10-bit HDR, VRR on LG C2 via Denon AVR.
# sdrbrightness=1.2 boosts SDR content by 20% to compensate for the
# dimming SDR gets when the display is in HDR mode (PQ EOTF maps SDR
# white at ~80 nits by default). sdrsaturation=1.05 adds a small
# saturation bump to counter the wider gamut washing out sRGB primaries.
# Without these, SDR apps (1Password, browsers, Quickshell home) render
# dim and desaturated. Tune values to taste on the LG C2.
monitor=HDMI-A-1,3840x2160@120,0x0,2,vrr,1,bitdepth,10,cm,hdr,sdrbrightness,1.2,sdrsaturation,1.05

# Fallback for any other monitor
monitor=,preferred,auto,auto

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
    force_default_wallpaper = 0
    vrr = 1
}

# Hyprland 0.51.x regression: the frog color management protocol path
# silently ignores sdrbrightness/sdrsaturation, leaving SDR content
# dim and washed out in HDR mode. Disabling the experimental v4
# protocol falls back to the tested path that honors SDR compensation.
# See https://github.com/hyprwm/Hyprland/discussions/11677
experimental {
    xx_color_management_v4 = false
}

general {
    border_size = 0
    gaps_in = 0
    gaps_out = 0
}

decoration {
    rounding = 0
    shadow:enabled = false
    blur:enabled = false
}

animations {
    enabled = false
}

input {
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

cursor {
    hide_on_key_press = true
}

xwayland {
    force_zero_scaling = true
}

# All app windows open fullscreen (Quickshell uses layer shell, unaffected)
windowrulev2 = fullscreen,class:(.+)

# Emergency exit to TTY
bind = SUPER, Q, exit

# Consume the bare Super_L press so focused apps (e.g. 1Password)
# never see it. The game-shell input daemon already reads the keyboard
# evdev device, sees both press and release directly, and runs its own
# 2 s tap-vs-hold timer there — broadcasting the same `home-press` /
# `combo:home-hold` events the controller Home button uses. We can't
# rely on Hyprland's `bindr` for the release leg because it doesn't
# fire reliably for bare modifier keys. `exec, true` is a no-op; this
# bind exists only to claim the Super_L press at the compositor.
# The more-specific `SUPER, Q` bind above still wins for Super+Q.
bind = , Super_L, exec, true

# Autostart Quickshell
exec-once = quickshell -c game-shell

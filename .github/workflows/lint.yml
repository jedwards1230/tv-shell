name: Lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  qml-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.*"
          cache: true

      - name: Check QML formatting
        id: check
        run: |
          failed=0
          while IFS= read -r f; do
            if ! qmlformat -c "$f" 2>/dev/null; then
              echo "::error file=$f::Not formatted — run: qmlformat -i $f"
              failed=1
            fi
          done < <(find . -name '*.qml' -not -path './worktrees/*' -not -path './.git/*')
          echo "failed=$failed" >> "$GITHUB_OUTPUT"
          exit $failed

      - name: Auto-format QML
        if: failure() && github.event_name == 'pull_request'
        run: |
          find . -name '*.qml' -not -path './worktrees/*' -not -path './.git/*' \
            -exec qmlformat -i {} +

      - name: Push formatted files
        if: failure() && github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "style: auto-format QML files"
          git push

name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  qml-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.*"
          cache: true

      - name: Check QML formatting
        run: |
          failed=0
          while IFS= read -r f; do
            if ! qmlformat -c "$f" 2>/dev/null; then
              echo "::error file=$f::Not formatted — run: qmlformat -i $f"
              failed=1
            fi
          done < <(find . -name '*.qml' -not -path './worktrees/*' -not -path './.git/*')
          exit $failed

# QML formatting (qmlformat). On PRs it auto-formats and pushes a fix commit; on
# main it fails if anything is unformatted.
#
# Invoked by the CI orchestrator (.github/workflows/ci.yml), which decides via
# path-based change detection whether any .qml changed. ci.yml passes the write
# permission + secrets needed for the auto-format push. ci.yml is the single
# required-check surface.

name: Lint

on:
  workflow_call:

permissions:
  contents: write

jobs:
  qml-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          cache: true

      - name: Format QML files
        run: |
          find . -name '*.qml' -not -path './worktrees/*' -not -path './.git/*' \
            -exec qmlformat -i {} +

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- '*.qml'; then
            echo "formatted=false" >> "$GITHUB_OUTPUT"
          else
            echo "formatted=true" >> "$GITHUB_OUTPUT"
            echo "::warning::qmlformat modified files — pushing auto-format commit"
            git diff --stat -- '*.qml'
          fi

      - name: Push formatted files
        if: steps.diff.outputs.formatted == 'true' && github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git restore --staged . 2>/dev/null || true
          git add -- '*.qml'
          git commit -m "style: auto-format QML files"
          git push

      - name: Fail on main if unformatted
        if: steps.diff.outputs.formatted == 'true' && github.event_name == 'push'
        run: |
          echo "::error::QML files are not formatted. Run qmlformat -i on all .qml files."
          exit 1

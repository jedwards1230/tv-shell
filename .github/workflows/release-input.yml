# Per-binary release workflow for the input daemon (daemon/).
#
# Triggered by pushing an `input-v*` tag (e.g. `input-v0.1.0`). Builds
# `tv-shell-input` with the canonical deploy feature set (`cec,mcp`) and
# publishes a GitHub Release at the tag with the Linux binary + `checksums.txt`.
#
# This mirrors the `cec` leg of rust.yml exactly: it runs on `rust:1-trixie`
# (glibc 2.41) because the prebuilt static libcec.a references glibc ≥2.38 C23
# symbols, and that matches the CachyOS deploy target's glibc. The static-libcec
# acceptance gate (no system libcec/libp8-platform link) is re-asserted here so a
# regressed bundling never ships in a release.
#
# Tag scheme (see CLAUDE.md › CI): `host-v*` releases the cross-platform host;
# `input-v*` releases this Linux daemon. The two artifacts are versioned
# independently within the one monorepo.

name: Release Input

run-name: "Release Input — ${{ github.ref_name }}"

on:
  push:
    tags: ['input-v*']

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    container: rust:1-trixie
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Static libcec (#179) downloads a prebuilt archive (no cmake/libclang); it
      # only needs the udev dev symlink + pkg-config for the link hint, plus
      # libdbus for bluer. Same deps as the rust.yml cec leg.
      - name: Install CEC + D-Bus build deps
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            libudev-dev libdbus-1-dev pkg-config

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: .
          key: release-input

      - name: Build (--features cec,mcp)
        run: cargo build --release -p tv-shell-input --features cec,mcp

      - name: Stage binary
        run: |
          mkdir -p dist
          cp target/release/tv-shell-input dist/tv-shell-input-x86_64-unknown-linux-gnu

      # Acceptance gate (#179): the static build must NOT dynamically link the
      # system libcec / libp8-platform — those are bundled into the binary. Read
      # the STAGED artifact so the gate verifies exactly what gets released.
      - name: Assert no system libcec dependency
        run: |
          BIN=dist/tv-shell-input-x86_64-unknown-linux-gnu
          echo "ldd $BIN:"
          ldd "$BIN" || true
          if ldd "$BIN" | grep -Eiq 'libcec|libp8-platform'; then
            echo "::error::tv-shell-input dynamically links system libcec/libp8-platform — static bundling (#179) regressed"
            exit 1
          fi
          echo "OK: no system libcec/libp8-platform dynamic dependency"

      - name: Generate checksums
        working-directory: dist
        run: sha256sum tv-shell-input-* | tee checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true

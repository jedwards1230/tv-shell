# Headless QML unit tests (QtQuickTest) for the shell's components.
#
# Runs the stock Qt `qmltestrunner` under QT_QPA_PLATFORM=offscreen — no
# Quickshell, no compositor, no GPU needed. Exercises real Quickshell-free
# components (QuickActions, …) against stub singletons; see tests/qml/README.md.
#
# Invoked by the CI orchestrator (.github/workflows/ci.yml), which decides via
# path-based change detection whether the shell QML / test harness changed, so
# unrelated PRs never reach this workflow. ci.yml is the single required-check
# surface.

name: QML Test

run-name: "QML Test — ${{ github.event_name }} on ${{ github.ref_name }} by @${{ github.actor }}"

on:
  workflow_call:

permissions:
  contents: read

jobs:
  qmltest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          cache: true

      - name: Run QML tests (offscreen)
        run: ./tests/qml/run.sh

# PR review — calls the shared reusable workflow in
# jedwards1230/release-workflows (claude-code-action@v1, Haiku, review-team +
# public marketplace + github_ci by default).
name: PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened, closed]

permissions:
  contents: read
  actions: read
  pull-requests: write
  id-token: write

jobs:
  review:
    if: github.event.action != 'closed'
    uses: jedwards1230/release-workflows/.github/workflows/claude-pr-review.yml@v1
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    with:
      draft_on_blocking: true
      extra_plugins: |
        qml-quality@jedwards1230-plugins
        rust-quality@jedwards1230-plugins
      focus: |
        game-shell is a Quickshell (QML) + Rust couch-gaming shell.
        - QML correctness: binding loops, unhandled signals, leaked Connections,
          null property access.
        - Rust safety: unwrap()/expect()/panic! on fallible paths, error
          propagation, the gamepad/input daemon lifecycle and key/intent IPC.
        - No hardcoded host paths/IPs that belong in config.
        - When the diff touches QML, prioritize the qml-quality:qml-reviewer agent; when it touches Rust, prioritize the rust-quality:rust-reviewer agent.
        Do NOT re-flag qmlformat/rustfmt/clippy — CI owns those.

  cancel-review:
    if: github.event.action == 'closed'
    permissions:
      actions: write
    uses: jedwards1230/release-workflows/.github/workflows/claude-pr-review-cancel.yml@v1
    with:
      review_workflow: "PR Review"

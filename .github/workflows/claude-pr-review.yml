# Automatic PR code review using Claude Code Action (Haiku model).
# Triggers on PR open/update, posts inline comments and a summary.
# Read-only review — writes nothing beyond PR comments.

name: Claude PR Review

run-name: "Review PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          claude_args: |
            --model claude-haiku-4-5
            --max-turns 50
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git fetch:*),Bash(git show:*),Read,Glob,Grep"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request. The PR branch is already checked out.

            ### Focus (Quickshell / QML + Hyprland TV shell)

            - No hardcoded host paths or secrets — use config/env
            - QML property-binding correctness; avoid leaks from Connections, Timers, or spawned processes
            - Launch/helper shell scripts: proper quoting and `set -euo pipefail`
            - Cleanup of spawned processes and sockets (the daemon/HTTP bridge)
            - Input handling and focus behavior appropriate for a gamepad/remote TV shell

            ### Output Instructions

            Use `mcp__github_inline_comment__create_inline_comment` for specific code issues.
            Use `gh pr comment` to post a single summary with your overall assessment.
            Only post GitHub comments — do not output review text as conversation messages.

            Skip praise. Focus on what needs fixing. Be specific and actionable.

      - name: Write job summary
        if: always()
        run: |
          EXEC_FILE="${RUNNER_TEMP}/claude-execution-output.json"
          {
            echo "## Claude PR Review"
            echo ""
            echo "**PR:** #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}"
            echo "**Session:** \`${{ steps.claude.outputs.session_id }}\`"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -f "$EXEC_FILE" ]; then
            RESULT=$(jq -r 'last | .subtype // "unknown"' "$EXEC_FILE" 2>/dev/null || echo "unknown")
            TURNS=$(jq -r 'last | .num_turns // "?"' "$EXEC_FILE" 2>/dev/null || echo "?")
            COST=$(jq -r 'last | .total_cost_usd // "?"' "$EXEC_FILE" 2>/dev/null || echo "?")
            {
              echo "| Metric | Value |"
              echo "|--------|-------|"
              echo "| Result | \`$RESULT\` |"
              echo "| Turns | $TURNS |"
              echo "| Cost | \$${COST} |"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

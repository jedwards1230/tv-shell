# Cross-platform CI for the tv-shell host sidecar (host/) + the shared
# protocol crate (protocol/).
#
# `tv-shell-host` enumerates and launches Steam games on the gaming PC; it must
# build for ANY cloner's machine (Linux/Windows/macOS), so this matrix exercises
# all three on the stable toolchain. The host is a distributed prebuilt binary
# built from CI (not constrained to the daemon's declared 1.75 MSRV — its modern
# dep closure pulls edition2024 crates that need Cargo >=1.85). Everything is
# `-p`-scoped to the cross-platform crates so the daemon's Linux-only evdev/cec
# graph is never pulled in — a bare `cargo build` on Windows would try the daemon
# and fail. The daemon has its own Linux-only CI in rust.yml.

# Invoked by the CI orchestrator (.github/workflows/ci.yml), which decides via
# path-based change detection whether the host crate changed. Kept as a separate
# reusable workflow so the host's cross-platform matrix + rationale stay in one
# focused file; ci.yml just calls it (and is the single required-check surface).

name: Host

run-name: "Host CI — ${{ github.event_name }} on ${{ github.ref_name }} by @${{ github.actor }}"

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Build on stable (the host ships as a prebuilt binary from CI; its dep
      # closure requires Cargo >=1.85, so it is not bound to the daemon's 1.75).
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: .
          key: host-${{ matrix.os }}

      - name: Format check
        id: fmt
        run: cargo fmt --check -p tv-shell-host -p tv-shell-protocol

      - name: Clippy
        id: clippy
        run: cargo clippy -p tv-shell-host -p tv-shell-protocol --all-targets -- -D warnings

      - name: Build
        id: build
        run: cargo build -p tv-shell-host -p tv-shell-protocol

      - name: Test
        id: test
        run: cargo test -p tv-shell-host -p tv-shell-protocol

      - name: Summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Host CI — \`host/\` + \`protocol/\` (${{ matrix.os }})"
            echo ""
            echo "| Step | Result |"
            echo "|------|--------|"
            echo "| Format | ${{ steps.fmt.outcome }} |"
            echo "| Clippy | ${{ steps.clippy.outcome }} |"
            echo "| Build | ${{ steps.build.outcome }} |"
            echo "| Test | ${{ steps.test.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"

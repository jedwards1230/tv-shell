# Rust CI for the game-shell input daemon (daemon/).
#
# Builds, formats, lints, and tests the daemon crate on a Linux runner — the only
# place the evdev/uinput code compiles (it is excluded on non-Linux dev hosts).
# Runs inside a slim official `rust` container (toolchain preinstalled, ~1.5 GB
# vs the ~30 GB ubuntu-latest image; no system libs needed — evdev is pure Rust).
#
# Since the repo is a Cargo workspace (daemon/ + host/ + protocol/), every cargo
# command is `-p game-shell-input`-scoped so the host crate (cross-platform, CI'd
# separately in host.yml) is never dragged into the daemon's Linux/cec build. The
# workspace shares one target dir at the repo ROOT, so the build output is at
# `../target/release/...` from `working-directory: daemon`.
#
# Invoked by the CI orchestrator (.github/workflows/ci.yml), which decides via
# path-based change detection whether the daemon/protocol crates changed, so
# QML-only PRs never reach this workflow. ci.yml is the single required-check
# surface.

name: Rust

run-name: "Rust CI — ${{ github.event_name }} on ${{ github.ref_name }} by @${{ github.actor }}"

on:
  workflow_call:

permissions:
  contents: read

defaults:
  run:
    working-directory: daemon

jobs:
  build:
    runs-on: ubuntu-latest
    container: rust:1-bookworm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # bluer (BlueZ binding) pulls in libdbus-sys, which needs the system
      # libdbus headers + pkg-config at build time. zbus is pure-Rust and needs
      # nothing. the gaming client has libdbus at runtime (dbus is core on Arch).
      - name: Install D-Bus build deps
        run: apt-get update && apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - name: Add rustfmt + clippy
        run: rustup component add rustfmt clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Format check
        id: fmt
        run: cargo fmt --check -p game-shell-input

      - name: Clippy
        id: clippy
        run: cargo clippy -p game-shell-input --all-targets -- -D warnings

      - name: Build
        id: build
        run: cargo build --release -p game-shell-input

      - name: Test
        id: test
        run: cargo test -p game-shell-input

      - name: Summary
        if: always()
        run: |
          {
            echo "## Rust CI — \`daemon/\`"
            echo ""
            echo "| Step | Result |"
            echo "|------|--------|"
            echo "| Format | ${{ steps.fmt.outcome }} |"
            echo "| Clippy | ${{ steps.clippy.outcome }} |"
            echo "| Build (release) | ${{ steps.build.outcome }} |"
            echo "| Test | ${{ steps.test.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # Separate leg for the OPTIONAL `cec` feature (#94). The default `build` job
  # above stays C-free; this job exercises the libcec link. The `cec` feature
  # forwards `libcec-sys/static` (#179), so libcec-sys STATIC-links a prebuilt
  # libcec + p8-platform into the binary (fetched from ssalonen/libcec-static-
  # builds) instead of dynamically linking the system libcec — the same build
  # the deploy host ships. Keeping it separate preserves the no-system-C-deps
  # invariant for the default build.
  #
  # Runs on Debian Trixie (glibc 2.41), NOT bookworm (glibc 2.36): the prebuilt
  # static libcec.a references the glibc ≥2.38 C23 symbols `__isoc23_sscanf` /
  # `__isoc23_strtoul`, so linking it on bookworm fails with "undefined symbol".
  # The deploy host (gaming-client / CachyOS) has glibc 2.43, so Trixie matches
  # the runtime target. The default `build` job stays on bookworm (it never links
  # libcec).
  cec:
    runs-on: ubuntu-latest
    container: rust:1-trixie
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Static libcec (#179) needs NO system libcec-dev / libclang / cmake: it
      # downloads a prebuilt static archive (no bindgen — libcec-sys ships
      # pre-generated bindings). It only needs the udev dev symlink + pkg-config
      # for the libudev link hint; libdbus is still required by bluer (the
      # feature build is a superset of the default Linux build).
      - name: Install CEC + D-Bus build deps
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            libudev-dev libdbus-1-dev pkg-config

      - name: Add clippy
        run: rustup component add clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          key: cec

      - name: Clippy (--features cec)
        id: clippy
        run: cargo clippy -p game-shell-input --features cec --all-targets -- -D warnings

      - name: Build (--features cec)
        id: build
        run: cargo build --release -p game-shell-input --features cec

      # Acceptance gate (#179): the static build must NOT pull in the system
      # libcec.so / libp8-platform.so — those are bundled into the binary. The
      # workspace target dir is at the repo ROOT, so from working-directory:
      # daemon the binary is one level up at ../target/release/.
      - name: Assert no system libcec dependency
        id: ldd
        run: |
          BIN=../target/release/game-shell-input
          echo "ldd $BIN:"
          ldd "$BIN" || true
          if ldd "$BIN" | grep -Eiq 'libcec|libp8-platform'; then
            echo "::error::game-shell-input dynamically links system libcec/libp8-platform — static bundling (#179) regressed"
            exit 1
          fi
          echo "OK: no system libcec/libp8-platform dynamic dependency"

      - name: Test (--features cec)
        id: test
        run: cargo test -p game-shell-input --features cec

      - name: Summary
        if: always()
        run: |
          {
            echo "## Rust CI — \`daemon/\` (--features cec)"
            echo ""
            echo "| Step | Result |"
            echo "|------|--------|"
            echo "| Clippy (cec) | ${{ steps.clippy.outcome }} |"
            echo "| Build (cec, release) | ${{ steps.build.outcome }} |"
            echo "| No system libcec (ldd) | ${{ steps.ldd.outcome }} |"
            echo "| Test (cec) | ${{ steps.test.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"

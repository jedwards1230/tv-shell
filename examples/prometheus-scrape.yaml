# Prometheus scrape snippet for game-shell-input's portable /metrics endpoint.
#
# This is the ALTERNATIVE collection path — use it when you'd rather scrape the
# daemon directly instead of going through a node_exporter textfile collector
# (the primary path; see examples/README.md). The /metrics route is auth-exempt,
# so no bearer token is needed here.
#
# Requires the HTTP bridge to be bound: set [http].bind in config.toml
# (e.g. 0.0.0.0:8089). Replace <host> and the port to match.
#
# Drop this under `scrape_configs:` in your prometheus.yml.

scrape_configs:
  - job_name: game-shell-input
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets:
          - "<host>:8089"
        labels:
          # Optional: tag the series with the box this shell runs on.
          instance: htpc-1

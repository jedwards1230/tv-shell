<div class="log-columns">
  <section class="log-panel">
    <h2>Shell (via HTTP bridge)</h2>
    {% if shell_available %}
    <pre>{{ shell_log }}</pre>
    {% else %}
    <p class="degraded-msg">{{ shell_message }}</p>
    {% endif %}
  </section>
  <section class="log-panel">
    <h2>Daemon (journal)</h2>
    <pre>{{ daemon_log }}</pre>
  </section>
</div>

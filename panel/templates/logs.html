{% extends "base.html" %}
{% block title %}Logs — tv-shell panel{% endblock %}
{% block content %}
<h1>Logs</h1>
<form class="log-controls" hx-get="/logs/view" hx-target="#log-panels" hx-swap="innerHTML">
  <label>Lines
    <input type="number" name="lines" value="200" min="1" max="1000">
  </label>
  <label>Filter
    <input type="text" name="filter" placeholder="substring…">
  </label>
  <label class="log-checkbox">
    <input type="checkbox" name="hide_icons">
    Hide icon noise
  </label>
  <button type="submit">Refresh</button>
</form>
<div class="log-presets">
  <button type="button" hx-get="/logs/view?filter=error" hx-target="#log-panels" hx-swap="innerHTML">Errors only</button>
  <button type="button" hx-get="/logs/view?hide_icons=on" hx-target="#log-panels" hx-swap="innerHTML">Hide icon noise</button>
</div>
<!-- Focus controls live OUTSIDE #log-panels — its innerHTML is replaced on
     every refresh/preset click, so a toggle button placed inside it (or a
     CSS class applied to something inside it) would be wiped on the next
     swap. The class this toggles lives on #log-panels itself, which htmx's
     innerHTML swap leaves untouched (only children are replaced). -->
<div class="log-focus-controls">
  <button type="button" id="log-focus-shell-btn" onclick="tvShellToggleLogFocus('shell')">Focus Shell</button>
  <button type="button" id="log-focus-daemon-btn" onclick="tvShellToggleLogFocus('daemon')">Focus Daemon</button>
</div>
<div id="log-panels" hx-get="/logs/view" hx-trigger="load" hx-swap="innerHTML">
  <p class="muted">Loading…</p>
</div>
<script>
// Clicking the already-active focus button returns to the even 50/50 split;
// clicking the other one switches focus to it.
function tvShellToggleLogFocus(which) {
  var panels = document.getElementById('log-panels');
  var cls = 'focus-' + which;
  if (panels.classList.contains(cls)) {
    panels.classList.remove(cls);
  } else {
    panels.classList.remove('focus-shell', 'focus-daemon');
    panels.classList.add(cls);
  }
}
</script>
{% endblock %}

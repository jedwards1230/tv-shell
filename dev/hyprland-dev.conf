# Headless dev config — 1080p virtual output, no hardware features
# Hyprland creates HEADLESS-1 automatically with the AQ_BACKEND=headless backend
monitor=HEADLESS-1,1920x1080@60,0x0,1
monitor=,preferred,auto,1

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
    force_default_wallpaper = 0
}

general {
    border_size = 0
    gaps_in = 0
    gaps_out = 0
}

decoration {
    rounding = 0
    shadow:enabled = false
    blur:enabled = false
}

animations {
    enabled = false
}

input {
    follow_mouse = 1
}

cursor {
    hide_on_key_press = true
}

xwayland {
    force_zero_scaling = true
}

windowrulev2 = fullscreen,class:(.+)

bind = SUPER, Q, exit

exec-once = quickshell -c game-shell
